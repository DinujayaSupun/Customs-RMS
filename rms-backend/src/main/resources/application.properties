spring.application.name=rms-backend

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/customs_rms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Upload settings (✅ external folder recommended)
# Windows example:
app.upload-dir=${APP_UPLOAD_DIR:C:/customs_uploads}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# JWT settings
app.jwt.secret=${JWT_SECRET:bQfTPF0u06EXoh7wwEIE+6Nx2mON2HbY6ekAKpEiawcnA7Ik0Z91OEgGS0rmgxOGe1zEVfaNnvGtgxa+VlGAFA==}
