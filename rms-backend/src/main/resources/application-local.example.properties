# Local machine overrides (do not commit real secrets)
# Use with: --spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/customs_rms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password

# 32+ byte key, Base64 encoded
app.jwt.secret=your_base64_jwt_secret

# Optional local override
app.upload-dir=C:/customs_uploads
